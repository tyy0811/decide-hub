name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: decide_hub
          POSTGRES_USER: decide_hub
          POSTGRES_PASSWORD: decide_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decide_hub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run schema
        run: psql -h localhost -U decide_hub -d decide_hub -f schema.sql
        env:
          PGPASSWORD: decide_hub

      - name: Run Python tests
        run: pytest tests/ -v --ignore=tests/e2e

      - name: NDCG regression gate
        run: |
          python -c "
          from src.policies.data import load_ratings, temporal_split
          from src.policies.popularity import PopularityPolicy
          ratings = load_ratings()
          train, test = temporal_split(ratings, n_test=5)
          policy = PopularityPolicy().fit(train)
          metrics = policy.evaluate(test, k=10)
          ndcg = metrics['ndcg@10']
          print(f'NDCG@10: {ndcg:.4f}')
          assert ndcg >= 0.01, f'NDCG regression: {ndcg} < 0.01'
          "

      - name: IPS correctness check
        run: |
          python -c "
          import numpy as np
          from src.evaluation.simulator import generate_logged_data, softmax
          from src.evaluation.counterfactual import ips_estimate
          data = generate_logged_data(n_samples=50000, seed=42)
          target_probs = [
              float(softmax(np.array(ctx) @ data['item_features'].T, temperature=0.5)[data['actions'][i]])
              for i, ctx in enumerate(data['contexts'])
          ]
          estimate = ips_estimate(data['rewards'], data['propensities'], target_probs)
          print(f'IPS estimate: {estimate:.4f}')
          assert 0 < estimate < 2.0, f'IPS out of range: {estimate}'
          "

      - name: Policy replay drift gate
        run: pytest tests/regression/test_policy_replay.py -v

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: decide_hub
          POSTGRES_USER: decide_hub
          POSTGRES_PASSWORD: decide_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decide_hub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install Node deps
        run: cd operator_ui && npm ci

      - name: Install Playwright browsers
        run: cd operator_ui && npx playwright install chromium --with-deps

      - name: Run schema
        run: psql -h localhost -U decide_hub -d decide_hub -f schema.sql
        env:
          PGPASSWORD: decide_hub

      - name: Run Playwright tests
        run: cd operator_ui && npx playwright test
