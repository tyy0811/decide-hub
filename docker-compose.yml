services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decide_hub
      POSTGRES_USER: decide_hub
      POSTGRES_PASSWORD: decide_hub
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decide_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://decide_hub:decide_hub@postgres:5432/decide_hub
    depends_on:
      postgres:
        condition: service_healthy

  operator_ui:
    build: ./operator_ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
